<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>ClickWheel — v5</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://www.youtube.com/iframe_api"></script>
<style>
:root {
  --shell-w: 340px;
  --screen-h: 320px;
  --wheel-d: 260px;
  --bg: #0c0e14;
  --shell: #1a1d26;
  --shell-hi: #23273a;
  --screen-bg: #05070f;
  --text: #eef1f8;
  --muted: #6b7590;
  --accent: #4f9cf9;
  --accent-2: #9b7bff;
  --good: #5edb97;
  --bad: #f97070;
  --row: #141720;
  --row-active: #1e3a6e;
  --row-border: rgba(255,255,255,.05);
  --wheel-face: #1c1f2e;
  --wheel-ring: #2a2e40;
  --wheel-btn: #eef1f8;
  --wheel-center: #262a3d;
  --line: rgba(255,255,255,.07);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ── Shell ── */
.ipod {
  width: var(--shell-w);
  background: linear-gradient(175deg, var(--shell-hi) 0%, var(--shell) 50%, #111420 100%);
  border-radius: 40px;
  padding: 18px 18px 24px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.08),
    0 30px 80px rgba(0,0,0,.7),
    inset 0 1px 0 rgba(255,255,255,.1);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  position: relative;
}

/* ── Screen ── */
.screen-wrap {
  width: 100%;
  height: var(--screen-h);
  border-radius: 20px;
  background: var(--screen-bg);
  border: 1px solid rgba(255,255,255,.06);
  box-shadow: inset 0 0 40px rgba(0,0,0,.6), 0 2px 10px rgba(0,0,0,.4);
  overflow: hidden;
  position: relative;
}

/* Status bar */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px 6px;
  font-size: 11px;
  color: var(--muted);
  border-bottom: 1px solid var(--line);
  letter-spacing: .02em;
}
.status-bar .app-name { color: var(--text); font-weight: 600; font-size: 12px; }
.status-bar .auth-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--bad); display: inline-block; margin-right: 5px;
  vertical-align: middle;
}
.status-bar .auth-dot.on { background: var(--good); }

/* Screen content — no scrolling, wheel does it */
.screen-content {
  height: calc(var(--screen-h) - 34px);
  overflow: hidden;
  position: relative;
}

.view {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity .18s ease;
}
.view.active { opacity: 1; pointer-events: all; }

/* View header */
.view-header {
  padding: 8px 12px 6px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--accent);
  border-bottom: 1px solid var(--line);
  flex: 0 0 auto;
}

/* Menu rows */
.menu-list {
  flex: 1; overflow: hidden;
  display: flex; flex-direction: column;
  gap: 1px;
  padding: 4px 0;
}
.menu-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 12px;
  font-size: 14px;
  background: transparent;
  border-left: 2px solid transparent;
  transition: background .1s, border-color .1s;
  flex: 0 0 auto;
  cursor: default;
}
.menu-row.sel {
  background: rgba(79,156,249,.13);
  border-left-color: var(--accent);
  color: #fff;
}
.menu-row .row-left { display: flex; align-items: center; gap: 9px; }
.menu-row .row-icon {
  width: 24px; height: 24px; border-radius: 7px;
  display: grid; place-items: center;
  font-size: 13px;
  background: rgba(255,255,255,.07);
  flex: 0 0 auto;
}
.menu-row .row-chev { color: var(--muted); font-size: 12px; }

/* Now playing bar */
.now-bar {
  flex: 0 0 auto;
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px;
  border-top: 1px solid var(--line);
  background: rgba(0,0,0,.3);
  font-size: 11px;
  color: var(--muted);
  min-height: 32px;
}
.now-bar .track-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); font-size: 12px; }
.now-bar .play-state { color: var(--accent); font-size: 14px; }

/* Playlist rows */
.playlist-list { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 1px; padding: 4px 0; }
.playlist-row {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 12px; font-size: 13px; flex: 0 0 auto;
  border-left: 2px solid transparent;
}
.playlist-row.sel { background: rgba(79,156,249,.13); border-left-color: var(--accent); color: #fff; }
.playlist-row .track-num { color: var(--muted); font-size: 11px; min-width: 22px; text-align: right; }
.playlist-row .track-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Settings form */
.settings-body { flex: 1; overflow: hidden; padding: 10px 12px; display: flex; flex-direction: column; gap: 10px; }
.setting-row { display: flex; flex-direction: column; gap: 4px; }
.setting-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
.setting-val {
  font-size: 12px; color: var(--text);
  background: rgba(255,255,255,.05);
  border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 10px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.setting-msg { font-size: 12px; padding: 7px 10px; border-radius: 8px; }
.setting-msg.good { color: var(--good); background: rgba(94,219,151,.08); }
.setting-msg.bad  { color: var(--bad);  background: rgba(249,112,112,.08); }
.setting-hint { font-size: 11px; color: var(--muted); line-height: 1.5; }
.setting-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.setting-btn {
  padding: 7px 14px; border-radius: 999px; border: 1px solid rgba(255,255,255,.12);
  background: rgba(255,255,255,.07); color: var(--text); font-size: 12px; cursor: pointer;
  font-family: inherit;
}
.setting-btn:active { background: rgba(255,255,255,.14); }
.setting-btn.primary { background: var(--accent); color: #000; border-color: transparent; font-weight: 600; }

/* Cover art view */
.cover-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 16px; }
.cover-art {
  width: 110px; height: 110px; border-radius: 16px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  box-shadow: 0 12px 30px rgba(0,0,0,.5);
  display: grid; place-items: center; font-size: 40px;
}
.cover-title { font-size: 15px; font-weight: 700; text-align: center; }
.cover-sub   { font-size: 12px; color: var(--muted); text-align: center; }
.progress-wrap { width: 100%; height: 3px; background: rgba(255,255,255,.1); border-radius: 2px; margin-top: 4px; }
.progress-bar  { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 1s linear; }

/* ── Wheel ── */
.wheel-wrap {
  position: relative;
  width: var(--wheel-d);
  height: var(--wheel-d);
  flex: 0 0 auto;
}
.wheel-ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 28%, #2e3350, var(--wheel-ring) 70%);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.07),
    0 8px 32px rgba(0,0,0,.6),
    inset 0 2px 4px rgba(255,255,255,.08),
    inset 0 -2px 4px rgba(0,0,0,.4);
}
.wheel-label {
  position: absolute; display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,.55); font-size: 11px; font-weight: 700; letter-spacing: .06em;
  pointer-events: none; text-transform: uppercase;
}
.wheel-label.top    { top: 16px;  left: 50%; transform: translateX(-50%); }
.wheel-label.left   { left: 14px; top: 50%;  transform: translateY(-50%); font-size: 18px; }
.wheel-label.right  { right: 14px;top: 50%;  transform: translateY(-50%); font-size: 18px; }
.wheel-label.bottom { bottom: 16px; left: 50%; transform: translateX(-50%); }

.wheel-center {
  position: absolute;
  width: 96px; height: 96px;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #31364d, var(--wheel-center) 80%);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.09),
    inset 0 2px 3px rgba(255,255,255,.08),
    0 4px 14px rgba(0,0,0,.5);
  cursor: pointer;
  display: grid; place-items: center;
  transition: background .12s;
}
.wheel-center:active { background: radial-gradient(circle at 35% 30%, #3d4460, #2a2f45 80%); }
.wheel-center-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,.2);
}

/* ── Hidden YT player ── */
#ytPlayer { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

/* ── Responsive: scale the whole iPod ── */
@media (max-height: 720px) {
  :root { --shell-w: 300px; --screen-h: 270px; --wheel-d: 230px; }
}
@media (max-height: 600px) {
  :root { --shell-w: 270px; --screen-h: 240px; --wheel-d: 200px; }
}
</style>
</head>
<body>

<div class="ipod" id="ipod">
  <!-- Screen -->
  <div class="screen-wrap">
    <div class="status-bar">
      <span class="app-name">ClickWheel</span>
      <span><span class="auth-dot" id="authDot"></span><span id="authLabel">Not signed in</span></span>
    </div>
    <div class="screen-content" id="screenContent">

      <!-- HOME -->
      <div class="view active" id="view-home">
        <div class="menu-list" id="home-list"></div>
        <div class="now-bar" id="now-bar">
          <span class="play-state" id="play-icon">♪</span>
          <span class="track-name" id="now-title">Nothing playing</span>
        </div>
      </div>

      <!-- PLAYLISTS -->
      <div class="view" id="view-playlists">
        <div class="view-header">Playlists</div>
        <div class="menu-list" id="playlist-list"></div>
        <div class="now-bar">
          <span class="play-state" id="play-icon2">♪</span>
          <span class="track-name" id="now-title2">Nothing playing</span>
        </div>
      </div>

      <!-- TRACKS -->
      <div class="view" id="view-tracks">
        <div class="view-header" id="tracks-header">Tracks</div>
        <div class="playlist-list" id="tracks-list"></div>
        <div class="now-bar">
          <span class="play-state">▶</span>
          <span class="track-name" id="now-title3">Nothing playing</span>
        </div>
      </div>

      <!-- NOW PLAYING cover -->
      <div class="view" id="view-nowplaying">
        <div class="view-header">Now Playing</div>
        <div class="cover-view">
          <div class="cover-art">🎵</div>
          <div class="cover-title" id="np-title">—</div>
          <div class="cover-sub"   id="np-sub">—</div>
          <div class="progress-wrap"><div class="progress-bar" id="np-prog"></div></div>
        </div>
      </div>

      <!-- SETTINGS -->
      <div class="view" id="view-settings">
        <div class="view-header">Settings</div>
        <div class="settings-body">
          <div class="setting-row">
            <div class="setting-label">Google OAuth Client ID</div>
            <div class="setting-val" id="cid-display">Using default</div>
          </div>
          <div class="setting-actions">
            <button class="setting-btn primary" onclick="doSignIn()">Sign in with Google</button>
            <button class="setting-btn" onclick="doLoadPlaylists()">Load playlists</button>
          </div>
          <div class="setting-msg bad" id="settings-msg">Not connected.</div>
          <div class="setting-actions">
            <button class="setting-btn" onclick="pressMenu()">⬅ Back to Home</button>
          </div>
          <div class="setting-hint">
            After signing in, press MENU on the wheel or tap Back to go to Playlists.
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Click Wheel -->
  <div class="wheel-wrap" id="wheelWrap">
    <div class="wheel-ring" id="wheelRing"></div>
    <div class="wheel-label top">MENU</div>
    <div class="wheel-label left">&#x2039;</div>
    <div class="wheel-label right">&#x203A;</div>
    <div class="wheel-label bottom">PLAY</div>
    <div class="wheel-center" id="wheelCenter">
      <div class="wheel-center-dot"></div>
    </div>
  </div>
</div>

<!-- Hidden YT player -->
<div id="ytPlayer"></div>

<script>
// ─── Config ────────────────────────────────────────────────────────────────
const CLIENT_ID = '626644774647-q2rpcto9th4ec2f784v9htc2pm6e8shc.apps.googleusercontent.com';
const SCOPE     = 'https://www.googleapis.com/auth/youtube.readonly';

// ─── State ─────────────────────────────────────────────────────────────────
const S = {
  token: '',
  playlists: [],
  videos: [],
  selPlaylist: 0,
  selTrack: 0,
  selHome: 0,
  currentView: 'home',
  player: null,
  playerReady: false,
  playing: false,
  currentTitle: '',
  currentSub: '',
};

const HOME_MENU = [
  { id:'nowplaying', label:'Now Playing', icon:'▶' },
  { id:'playlists',  label:'Playlists',   icon:'♫' },
  { id:'settings',   label:'Settings',    icon:'⚙' },
];

// ─── DOM refs ──────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

// ─── View routing ──────────────────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  $(id).classList.add('active');
  S.currentView = id.replace('view-','');
}

// ─── Home menu render ──────────────────────────────────────────────────────
function renderHome() {
  const list = $('home-list');
  list.innerHTML = HOME_MENU.map((item, i) => `
    <div class="menu-row ${i === S.selHome ? 'sel' : ''}" data-idx="${i}">
      <div class="row-left">
        <div class="row-icon">${item.icon}</div>
        <span>${item.label}</span>
      </div>
      <span class="row-chev">›</span>
    </div>
  `).join('');
}

// ─── Playlists render ──────────────────────────────────────────────────────
function renderPlaylists() {
  const list = $('playlist-list');
  if (!S.playlists.length) {
    list.innerHTML = '<div class="menu-row"><div class="row-left"><div class="row-icon">?</div><span style="color:var(--muted)">Go to Settings → Sign in first</span></div></div>';
    return;
  }
  list.innerHTML = S.playlists.map((p, i) => `
    <div class="menu-row ${i === S.selPlaylist ? 'sel' : ''}" data-idx="${i}">
      <div class="row-left">
        <div class="row-icon">♫</div>
        <span>${esc(p.snippet?.title || 'Untitled')}</span>
      </div>
      <span class="row-chev">›</span>
    </div>
  `).join('');
}

// ─── Tracks render ─────────────────────────────────────────────────────────
function renderTracks() {
  const list = $('tracks-list');
  list.innerHTML = S.videos.map((v, i) => `
    <div class="playlist-row ${i === S.selTrack ? 'sel' : ''}" data-idx="${i}">
      <span class="track-num">${String(i+1).padStart(2,'0')}</span>
      <span class="track-title">${esc(v.snippet?.title || 'Untitled')}</span>
    </div>
  `).join('');
}

// ─── Scroll selected row into view inside fixed-height list ────────────────
function scrollSelIntoView(listId, selClass) {
  const list = $(listId);
  const sel  = list?.querySelector(selClass);
  if (!sel || !list) return;
  const lTop = list.scrollTop;
  const lH   = list.clientHeight;
  const sTop = sel.offsetTop;
  const sH   = sel.clientHeight;
  if (sTop < lTop) list.scrollTop = sTop;
  else if (sTop + sH > lTop + lH) list.scrollTop = sTop + sH - lH;
}

// ─── Now playing bar sync ──────────────────────────────────────────────────
function syncNowBar() {
  const icon  = S.playing ? '▶' : '♪';
  $('play-icon').textContent  = icon;
  $('play-icon2').textContent = icon;
  $('now-title').textContent  = S.currentTitle || 'Nothing playing';
  $('now-title2').textContent = S.currentTitle || 'Nothing playing';
  $('now-title3').textContent = S.currentTitle || 'Nothing playing';
  $('np-title').textContent   = S.currentTitle || '—';
  $('np-sub').textContent     = S.currentSub   || '—';
}

// ─── Auth / UI ─────────────────────────────────────────────────────────────
function setAuth(ok, label) {
  $('authDot').className  = 'auth-dot' + (ok ? ' on' : '');
  $('authLabel').textContent = label;
}

function setMsg(msg, cls) {
  const el = $('settings-msg');
  el.textContent = msg;
  el.className   = 'setting-msg ' + (cls || 'bad');
}

function doSignIn() {
  if (window.google?.accounts?.oauth2) {
    const tc = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID, scope: SCOPE,
      callback(resp) {
        if (resp?.access_token) {
          S.token = resp.access_token;
          setAuth(true, 'Connected');
          setMsg('Signed in! Select Load playlists.', 'good');
        } else {
          setMsg('Sign-in failed.', 'bad');
        }
      }
    });
    tc.requestAccessToken({ prompt: 'consent' });
  } else {
    // Redirect fallback
    const url = new URL('https://accounts.google.com/o/oauth2/v2/auth');
    url.searchParams.set('client_id', CLIENT_ID);
    url.searchParams.set('redirect_uri', location.origin + location.pathname);
    url.searchParams.set('response_type', 'token');
    url.searchParams.set('scope', SCOPE);
    url.searchParams.set('prompt', 'consent');
    location.href = url.toString();
  }
}

function handleRedirect() {
  if (!location.hash) return;
  const p = new URLSearchParams(location.hash.slice(1));
  const t = p.get('access_token');
  if (t) {
    S.token = t;
    setAuth(true, 'Connected');
    setMsg('Signed in! Select Load playlists.', 'good');
    history.replaceState(null, '', location.pathname);
  }
}

async function ytFetch(url) {
  const res = await fetch(url, { headers: { Authorization: 'Bearer ' + S.token } });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function doLoadPlaylists() {
  if (!S.token) { setMsg('Sign in first.', 'bad'); return; }
  setMsg('Loading…', 'bad');
  try {
    const url = new URL('https://www.googleapis.com/youtube/v3/playlists');
    url.searchParams.set('part','snippet,contentDetails');
    url.searchParams.set('mine','true');
    url.searchParams.set('maxResults','50');
    const data = await ytFetch(url.toString());
    S.playlists = data.items || [];
    setMsg(`Loaded ${S.playlists.length} playlists.`, 'good');
    renderPlaylists();
  } catch(e) {
    setMsg('Error: ' + String(e.message||e).slice(0,80), 'bad');
  }
}

async function loadPlaylistTracks(idx) {
  const pl = S.playlists[idx];
  if (!pl) return;
  try {
    const url = new URL('https://www.googleapis.com/youtube/v3/playlistItems');
    url.searchParams.set('part','snippet,contentDetails');
    url.searchParams.set('playlistId', pl.id);
    url.searchParams.set('maxResults','50');
    const data = await ytFetch(url.toString());
    S.videos    = (data.items || []).filter(i => i.contentDetails?.videoId);
    S.selTrack  = 0;
    $('tracks-header').textContent = pl.snippet?.title || 'Tracks';
    renderTracks();
    showView('view-tracks');
    if (S.videos.length) playVideo(S.videos[0]);
  } catch(e) {
    setMsg('Track load error: ' + String(e.message||e).slice(0,80), 'bad');
  }
}

// ─── Playback ───────────────────────────────────────────────────────────────
function onYouTubeIframeAPIReady() { S.playerReady = true; }

function playVideo(item) {
  const vid   = item.contentDetails?.videoId;
  const title = item.snippet?.title || 'Untitled';
  if (!vid) return;
  S.currentTitle = title;
  S.currentSub   = S.playlists[S.selPlaylist]?.snippet?.title || '';
  S.playing = true;
  syncNowBar();

  if (S.player?.loadVideoById) {
    S.player.loadVideoById({ videoId: vid, suggestedQuality: 'small' });
    return;
  }
  if (!window.YT?.Player) { setTimeout(() => playVideo(item), 800); return; }
  S.player = new YT.Player('ytPlayer', {
    height: '1', width: '1', videoId: vid,
    playerVars: { controls: 0, playsinline: 1, rel: 0, vq: 'small' },
    events: {
      onReady(e) { S.playerReady = true; e.target.setPlaybackQuality('small'); e.target.playVideo(); },
      onStateChange(e) {
        S.playing = (e.data === YT.PlayerState.PLAYING);
        syncNowBar();
      }
    }
  });
}

function togglePlay() {
  if (!S.player?.getPlayerState) return;
  const st = S.player.getPlayerState();
  if (st === YT.PlayerState.PLAYING) { S.player.pauseVideo(); S.playing = false; }
  else { S.player.playVideo(); S.playing = true; }
  syncNowBar();
}

// ─── Navigation ─────────────────────────────────────────────────────────────
function selectRow(delta) {
  if (S.currentView === 'home') {
    S.selHome = (S.selHome + delta + HOME_MENU.length) % HOME_MENU.length;
    renderHome();
    scrollSelIntoView('home-list', '.menu-row.sel');
  } else if (S.currentView === 'playlists') {
    S.selPlaylist = (S.selPlaylist + delta + Math.max(S.playlists.length, 1)) % Math.max(S.playlists.length, 1);
    renderPlaylists();
    scrollSelIntoView('playlist-list', '.menu-row.sel');
  } else if (S.currentView === 'tracks') {
    S.selTrack = (S.selTrack + delta + Math.max(S.videos.length, 1)) % Math.max(S.videos.length, 1);
    renderTracks();
    scrollSelIntoView('tracks-list', '.playlist-row.sel');
  }
}

function pressCenter() {
  if (S.currentView === 'home') {
    const item = HOME_MENU[S.selHome];
    if (item.id === 'playlists')   { renderPlaylists(); showView('view-playlists'); }
    else if (item.id === 'settings') showView('view-settings');
    else if (item.id === 'nowplaying') showView('view-nowplaying');
  } else if (S.currentView === 'playlists') {
    if (S.playlists.length) loadPlaylistTracks(S.selPlaylist);
  } else if (S.currentView === 'tracks') {
    const v = S.videos[S.selTrack];
    if (v) { playVideo(v); showView('view-nowplaying'); }
  }
}

function pressMenu() {
  if (S.currentView === 'home') return;
  if (['playlists','settings','nowplaying'].includes(S.currentView)) { renderHome(); showView('view-home'); }
  else if (S.currentView === 'tracks') { renderPlaylists(); showView('view-playlists'); }
}

function pressPlay() { togglePlay(); }
function pressPrev() { selectRow(-1); }
function pressNext() { selectRow(1); }

// ─── Keyboard support ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp'   || e.key === 'ArrowLeft')  selectRow(-1);
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') selectRow(1);
  if (e.key === 'Enter') pressCenter();
  if (e.key === 'Backspace' || e.key === 'Escape') pressMenu();
  if (e.key === ' ') { e.preventDefault(); pressPlay(); }
});

// ─── Click Wheel — rotary gesture + tap zones ───────────────────────────────
(function() {
  const ring   = $('wheelRing');
  const center = $('wheelCenter');
  const wrap   = $('wheelWrap');

  // Tap zones on ring — shared handler used by both click and touchend
  function fireTapZone(clientX, clientY) {
    const rect = ring.getBoundingClientRect();
    const cx   = rect.left + rect.width  / 2;
    const cy   = rect.top  + rect.height / 2;
    const dx   = clientX - cx;
    const dy   = clientY - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const r    = rect.width / 2;
    if (dist < r * 0.38 || dist > r * 0.97) return; // center or outside ring
    const angle = Math.atan2(dy, dx) * 180 / Math.PI;
    if (angle > -135 && angle < -45)      pressMenu(); // top
    else if (angle >= -45 && angle < 45)  pressNext(); // right
    else if (angle >= 45 && angle < 135)  pressPlay(); // bottom
    else                                  pressMenu(); // left
  }

  // Mouse click (desktop)
  ring.addEventListener('click', e => fireTapZone(e.clientX, e.clientY));

  center.addEventListener('click', e => { e.stopPropagation(); pressCenter(); });
  center.addEventListener('touchend', e => { e.stopPropagation(); e.preventDefault(); pressCenter(); }, { passive: false });

  // ── Rotary drag ────────────────────────────────────────────────────────
  let lastAngle = null;
  let accum     = 0;
  const STEP    = 30; // degrees per scroll tick

  function getAngle(e, rect) {
    const cx = rect.left + rect.width  / 2;
    const cy = rect.top  + rect.height / 2;
    const dx = (e.touches ? e.touches[0].clientX : e.clientX) - cx;
    const dy = (e.touches ? e.touches[0].clientY : e.clientY) - cy;
    return Math.atan2(dy, dx) * 180 / Math.PI;
  }

  function isOnRing(e, rect) {
    const cx   = rect.left + rect.width  / 2;
    const cy   = rect.top  + rect.height / 2;
    const px   = (e.touches ? e.touches[0].clientX : e.clientX);
    const py   = (e.touches ? e.touches[0].clientY : e.clientY);
    const dist = Math.sqrt((px-cx)**2 + (py-cy)**2);
    const r    = rect.width / 2;
    return dist > r * 0.38 && dist < r * 0.96;
  }

  let startX = null, startY = null, didDrag = false;

  function onStart(e) {
    const rect = wrap.getBoundingClientRect();
    if (!isOnRing(e, rect)) return;
    lastAngle = getAngle(e, rect);
    accum = 0;
    didDrag = false;
    startX = e.touches ? e.touches[0].clientX : e.clientX;
    startY = e.touches ? e.touches[0].clientY : e.clientY;
    e.preventDefault();
  }

  function onMove(e) {
    if (lastAngle === null) return;
    const rect  = wrap.getBoundingClientRect();
    const angle = getAngle(e, rect);
    let delta   = angle - lastAngle;
    // Wrap around ±180
    if (delta > 180)  delta -= 360;
    if (delta < -180) delta += 360;
    accum += delta;
    lastAngle = angle;
    if (Math.abs(accum) > 8) didDrag = true;
    while (accum >= STEP)  { selectRow(1);  accum -= STEP; }
    while (accum <= -STEP) { selectRow(-1); accum += STEP; }
    e.preventDefault();
  }

  function onEnd(e) {
    // If finger barely moved, treat as a tap on the ring zone
    if (!didDrag && startX !== null) {
      const ex = e.changedTouches ? e.changedTouches[0].clientX : startX;
      const ey = e.changedTouches ? e.changedTouches[0].clientY : startY;
      const dx = ex - startX, dy = ey - startY;
      const moved = Math.sqrt(dx*dx + dy*dy);
      if (moved < 12) fireTapZone(ex, ey);
    }
    lastAngle = null; accum = 0; startX = null; startY = null; didDrag = false;
  }

  // Touch
  wrap.addEventListener('touchstart', onStart, { passive: false });
  wrap.addEventListener('touchmove',  onMove,  { passive: false });
  wrap.addEventListener('touchend',   onEnd);
  // Mouse (desktop)
  wrap.addEventListener('mousedown',  onStart);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup',   onEnd);

  // Swipe up/down on wheel as alternative
  let swipeStartY = null;
  const SWIPE_STEP = 18;
  wrap.addEventListener('touchstart', e => {
    swipeStartY = e.touches[0].clientY;
  }, { passive: true });

})();

// ─── Prevent page scroll on touch ──────────────────────────────────────────
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// ─── Util ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Init ───────────────────────────────────────────────────────────────────
handleRedirect();
renderHome();
showView('view-home');
$('cid-display').textContent = CLIENT_ID.slice(0, 28) + '…';
</script>
</body>
